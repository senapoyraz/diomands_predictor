<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 Elmas Fiyat Tahmini</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .kart {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.alt {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #c4b5fd;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        input, select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(167,139,250,0.4);
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            border-color: #a78bfa;
        }

        select option { background: #302b63; }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(90deg, #7c3aed, #2563eb, #db2777);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124,58,237,0.6);
        }

        .sonuc {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(37,99,235,0.3));
            border: 2px solid rgba(167,139,250,0.5);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .sonuc h2 { color: #c4b5fd; font-size: 1rem; margin-bottom: 0.3rem; }

        .sonuc h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badges { margin-top: 0.8rem; }

        .badge {
            display: inline-block;
            background: rgba(167,139,250,0.2);
            border: 1px solid rgba(167,139,250,0.4);
            border-radius: 20px;
            padding: 0.25rem 0.8rem;
            color: #c4b5fd;
            font-size: 0.8rem;
            margin: 0.2rem;
        }
    </style>
</head>
<body>
    <div class="kart">
        <h1>💎 Elmas Fiyat Tahmini</h1>
        <p class="alt">Elmasının özelliklerini gir, yapay zeka fiyatı tahmin etsin</p>

        <div class="grid">
            <div>
                <label>💎 Karat</label>
                <input type="number" id="carat" value="1.00" min="0.2" max="5.0" step="0.01">
            </div>
            <div>
                <label>✂️ Kesim Kalitesi</label>
                <select id="cut">
                    <option>Fair</option>
                    <option>Good</option>
                    <option>Very Good</option>
                    <option>Premium</option>
                    <option selected>Ideal</option>
                </select>
            </div>
            <div>
                <label>🎨 Renk (D en iyi)</label>
                <select id="color">
                    <option selected>D</option>
                    <option>E</option>
                    <option>F</option>
                    <option>G</option>
                    <option>H</option>
                    <option>I</option>
                    <option>J</option>
                </select>
            </div>
            <div>
                <label>🔍 Berraklık (IF en iyi)</label>
                <select id="clarity">
                    <option selected>IF</option>
                    <option>VVS1</option>
                    <option>VVS2</option>
                    <option>VS1</option>
                    <option>VS2</option>
                    <option>SI1</option>
                    <option>SI2</option>
                    <option>I1</option>
                </select>
            </div>
            <div>
                <label>📐 Derinlik (%)</label>
                <input type="number" id="depth" value="61.7" min="43" max="79" step="0.1">
            </div>
            <div>
                <label>📏 Table (%)</label>
                <input type="number" id="table" value="57.0" min="43" max="95" step="0.1">
            </div>
        </div>

        <button onclick="tahminEt()">✨ Fiyatı Tahmin Et</button>

        <div class="sonuc" id="sonuc">
            <h2>Tahmini Piyasa Değeri</h2>
            <h1 id="fiyat"></h1>
            <div class="badges" id="badges"></div>
        </div>
    </div>

    <script>
        async function tahminEt() {
            const veri = {
                carat:   parseFloat(document.getElementById('carat').value),
                cut:     document.getElementById('cut').value,
                color:   document.getElementById('color').value,
                clarity: document.getElementById('clarity').value,
                depth:   parseFloat(document.getElementById('depth').value),
                table:   parseFloat(document.getElementById('table').value)
            };

            const cevap = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(veri)
            });

            const data = await cevap.json();

            document.getElementById('fiyat').textContent = '$' + data.tahmin.toLocaleString();
            document.getElementById('badges').innerHTML = `
                <span class="badge">💎 ${veri.carat} Karat</span>
                <span class="badge">✂️ ${veri.cut}</span>
                <span class="badge">🎨 ${veri.color}</span>
                <span class="badge">🔍 ${veri.clarity}</span>
            `;
            document.getElementById('sonuc').style.display = 'block';
        }
    </script>
</body>
</html>
